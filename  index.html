<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Latakiano 3D Billiard Ultimate</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(to bottom,#ffccd5,#ffeeff);color:#fff;text-align:center;}
h1{margin:10px 0;color:#ff66aa;text-shadow:2px 2px 5px #000;}
#gameContainer{width:100vw;height:70vh;display:block;margin:0 auto;border:2px solid #fff;background-color:#331122;}
#ui{margin-top:10px;}
button{padding:10px 20px;margin:0 10px;font-size:16px;cursor:pointer;border-radius:8px;border:none;background-color:#ff66aa;color:#fff;transition:0.3s;}
button:hover{background-color:#ff99cc;}
#powerBar{width:200px;height:15px;background:#fff;margin:10px auto;border-radius:8px;overflow:hidden;}
#powerLevel{width:0%;height:100%;background:#ff66aa;}
#leaderboard,#turn{margin-top:10px;}
</style>
</head>
<body>
<h1>Latakiano 3D Billiard Ultimate 🌟</h1>
<div id="gameContainer"></div>
<div id="ui">
<button onclick="changeTable()">تغيير الطاولة</button>
<span id="coins">Coins: 0</span>
<button onclick="trainingMode()">تدريب</button>
<button onclick="toggleMusic()">تشغيل/إيقاف الموسيقى</button>
<div id="powerBar"><div id="powerLevel"></div></div>
<div id="turn">Turn: Player 1</div>
<div id="leaderboard">Leaderboard: </div>
</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_b245f7e70a.mp3?filename=romantic-piano-11203.mp3" type="audio/mpeg">
</audio>
<audio id="ballSound"><source src="https://cdn.pixabay.com/download/audio/2021/09/21/audio_f6bb2b28f3.mp3?filename=hit-1-4583.mp3" type="audio/mpeg"></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
<script>
// --- المشهد والكاميرا ---
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x331122);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,60,100); camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById('gameContainer').appendChild(renderer.domElement);

// --- أضواء رومانسية ونجوم ---
const light1=new THREE.PointLight(0xff99cc,1.2,200); light1.position.set(50,50,50); scene.add(light1);
const light2=new THREE.PointLight(0xffccff,0.8,200); light2.position.set(-50,50,-50); scene.add(light2);
scene.add(new THREE.AmbientLight(0x404040,0.5));
for(let i=0;i<50;i++){const starGeo=new THREE.SphereGeometry(0.3,6,6);
const starMat=new THREE.MeshBasicMaterial({color:0xffffff});
const star=new THREE.Mesh(starGeo,starMat);
star.position.set(Math.random()*100-50,Math.random()*50,Math.random()*100-50);
scene.add(star);}

// --- Cannon.js World ---
const world=new CANNON.World({gravity:new CANNON.Vec3(0,-9.82,0)});

// --- الطاولة ---
let tableIndex=0;
const tablesData=[{color:0x006400},{color:0x552200},{color:0x333366},{color:0x883399},{color:0x22aaaa}];
let tableShape=new CANNON.Box(new CANNON.Vec3(50,2.5,25));
let tableBody=new CANNON.Body({mass:0,shape:tableShape}); tableBody.position.set(0,-2.5,0); world.addBody(tableBody);
let tableMesh=new THREE.Mesh(new THREE.BoxGeometry(100,5,50),new THREE.MeshPhongMaterial({color:tablesData[tableIndex].color}));
tableMesh.position.copy(tableBody.position); scene.add(tableMesh);

// --- الكرات ---
const balls=[]; const ballMeshes=[]; const ballRadius=2; const colors=[0xff0000,0x0000ff,0xffff00,0xffffff,0x00ff00,0xff00ff];
colors.forEach((color,i)=>{
    const sphereShape=new CANNON.Sphere(ballRadius);
    const sphereBody=new CANNON.Body({mass:1,shape:sphereShape,position:new CANNON.Vec3(i*5-10,2,0)});
    sphereBody.linearDamping=0.3; world.addBody(sphereBody); balls.push(sphereBody);
    const sphereGeo=new THREE.SphereGeometry(ballRadius,32,32);
    const sphereMat=new THREE.MeshPhongMaterial({color:color,shininess:100});
    const sphereMesh=new THREE.Mesh(sphereGeo,sphereMat); scene.add(sphereMesh); ballMeshes.push(sphereMesh);
});

// --- عصا البلياردو ---
const cueGeometry=new THREE.CylinderGeometry(0.2,0.2,20,12);
const cueMaterial=new THREE.MeshPhongMaterial({color:0xffffaa});
const cueStick=new THREE.Mesh(cueGeometry,cueMaterial); cueStick.rotation.z=Math.PI/2; scene.add(cueStick); cueStick.visible=false;

// --- Coins ونظام نقاط ---
let coins=0; function addCoins(amount){ coins+=amount; document.getElementById('coins').innerText="Coins: "+coins; updateLeaderboard(); }

// --- تغيير الطاولة ---
function changeTable(){ tableIndex=(tableIndex+1)%tablesData.length; tableMesh.material.color.setHex(tablesData[tableIndex].color);}
window.changeTable=changeTable;

// --- التدريب ---
function trainingMode(){ alert("وضع التدريب: حاول ضرب الكرة البيضاء في الهدف المحدد!"); }
window.trainingMode=trainingMode;

// --- الموسيقى ---
const bgMusic=document.getElementById('bgMusic'); let musicPlaying=false;
function toggleMusic(){ musicPlaying=!musicPlaying; musicPlaying?bgMusic.play():bgMusic.pause(); }
window.toggleMusic=toggleMusic;

// --- Leaderboard ---
const leaderboardDiv=document.getElementById('leaderboard'); const leaderboard=[];
function updateLeaderboard(){ leaderboard.push(coins); leaderboard.sort((a,b)=>b-a); leaderboardDiv.innerText="Leaderboard: "+leaderboard.slice(0,5).join(", "); }

// --- Turn system ---
let currentPlayer=1; const turnDiv=document.getElementById('turn');
function switchPlayer(){ currentPlayer=currentPlayer===1?2:1; turnDiv.innerText="Turn: Player "+currentPlayer; }

// --- الأصوات ---
const ballSound=document.getElementById('ballSound');

// --- التحكم بالضربة بالماوس ---
let isAiming=false, power=0;
const powerLevelDiv=document.getElementById('powerLevel');
window.addEventListener('mousedown',()=>{isAiming=true; cueStick.visible=true; power=0;});
window.addEventListener('mouseup',()=>{
    if(isAiming){
        const cueBall=balls[balls.length-1];
        cueBall.velocity.set(0,0,-power); addCoins(Math.floor(power)); ballSound.play();
        power=0; isAiming=false; cueStick.visible=false; powerLevelDiv.style.width='0%'; switchPlayer();
    }
});
window.addEventListener('mousemove',(e)=>{
    if(isAiming){
        power=Math.min(power+0.5,70);
        powerLevelDiv.style.width=(power*1.4)+'%';
        cueStick.position.set(0,2,balls[balls.length-1].position.z+5);
    }
});

// --- تحديث الحركة ---
const timeStep=1/60;
function animate(){ requestAnimationFrame(animate); world.step(timeStep);
balls.forEach((ball,i)=> ballMeshes[i].position.copy(ball.position)); renderer.render(scene,camera);}
animate();

// --- ضبط الشاشة ---
window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
</script>
</body>
</html>
